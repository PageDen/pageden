# Map for WebSocket connection upgrade (used by the /api/live editor socket).
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50m;   # attachment uploads proxied to /api

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin API proxy so the session cookie stays first-party.
  # proxy_http_version 1.1 + Upgrade/Connection headers let the live
  # collaboration WebSocket (/api/live/...) negotiate an upgrade.
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Edge already set a trustworthy XFF (client IP); append this internal hop.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
