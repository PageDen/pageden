name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Run the bundled JavaScript actions on Node 24 ahead of the Node 20 removal
# (matches the convention used in ci.yml).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (with GitHub Actions as the source) via the API if it
          # isn't already, so the deploy doesn't depend on a manual settings toggle.
          enablement: true

      - name: Upload landing site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site lives here; the CNAME file in this folder
          # keeps the pageden.app custom domain.
          path: apps/landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
