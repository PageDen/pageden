# Shared edge for one Droplet hosting prod (go.pageden.app + *.pageden.app)
# and staging (go.pageden.io + *.pageden.io).
map_hash_bucket_size 128;
map $http_upgrade $connection_upgrade { default upgrade; '' close; }
include /etc/nginx/staging-auth-cookie.conf;

# ---- HTTP: healthcheck + ACME for both, redirect everything else to HTTPS ----
server {
  listen 80;
  listen [::]:80;
  server_name go.pageden.app *.pageden.app go.pageden.io *.pageden.io;
  location = /healthz { return 200 "ok\n"; }
  location / { return 301 https://$host$request_uri; }
}

# ---- PRODUCTION ----
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name go.pageden.app *.pageden.app;

  ssl_certificate     /etc/letsencrypt/live/pageden.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pageden.app/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50m;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location / {
    proxy_pass http://prod-web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}

# ---- STAGING ----
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name go.pageden.io *.pageden.io;

  ssl_certificate     /etc/letsencrypt/live/pageden.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pageden.io/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50m;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location / {
    auth_basic $staging_auth_realm;
    auth_basic_user_file /etc/nginx/staging.htpasswd;
    add_header Set-Cookie $staging_auth_cookie;

    proxy_pass http://staging-web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
